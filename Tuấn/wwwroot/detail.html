<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết kỳ thi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h2>📄 Chi tiết kỳ thi</h2>

    <div id="content">
        <p>Đang tải...</p>
    </div>

    <br>
    <a href="index.html">⬅ Quay lại</a>

    <script>const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const content = document.getElementById("content");

        function getCountdown(examDate, examTime) {
            try {
                const examDateTime = new Date(`${examDate}T${examTime}`);
                const now = new Date();

                if (isNaN(examDateTime)) return "Không xác định";

                const diff = examDateTime - now;

                if (diff <= 0) return "Đã kết thúc";

                const minutes = Math.floor(diff / 60000);

                if (minutes < 60) {
                    return `Còn ${minutes} phút`;
                }

                const hours = Math.floor(minutes / 60);
                const days = Math.floor(hours / 24);
                const remainHours = hours % 24;

                return `Còn ${days} ngày ${remainHours} giờ`;
            } catch {
                return "Không xác định";
            }
        }

        if (!id) {
            content.innerHTML = "<p style='color:red;'>Thiếu ID!</p>";
        } else {
            fetch('/api/Exam')
                .then(res => res.json())
                .then(exams => {
                    const exam = exams.find(e => e.id == id);

                    if (!exam) {
                        content.innerHTML = "<p style='color:red;'>Không tìm thấy kỳ thi</p>";
                        return;
                    }

                    const date = new Date(exam.examDate).toLocaleDateString('vi-VN');
                    const room = exam.room || 'Chưa xếp';
                    const countdown = getCountdown(exam.examDate, exam.examTime);

                    content.innerHTML = `
                        <p><b>ID:</b> ${exam.id}</p>
                        <p><b>Môn:</b> ${exam.subjectName}</p>
                        <p><b>Ngày:</b> ${date}</p>
                        <p><b>Giờ:</b> ${exam.examTime}</p>
                        <p><b>Phòng:</b> ${room}</p>
                        <p style="color:green; font-weight:bold;">${countdown}</p>
                    `;
                })
                .catch(() => {
                    content.innerHTML = "<p style='color:red;'>Không thể tải dữ liệu</p>";
                });
        }</script>

</body>
</html>

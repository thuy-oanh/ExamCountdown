<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết kỳ thi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h2>📄 Chi tiết kỳ thi</h2>

    <div id="content">
        <p>Đang tải...</p>
    </div>

    <br>
    <a href="index.html">⬅ Quay lại</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            document.getElementById("content").innerHTML = "Thiếu ID!";
        } else {
            fetch(`/api/exam/${id}`)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(exam => {
                    const date = new Date(exam.examDate).toLocaleDateString('vi-VN');

                    document.getElementById("content").innerHTML = `
                            <p><b>ID:</b> ${exam.id}</p>
                            <p><b>Môn:</b> ${exam.subjectName}</p>
                            <p><b>Ngày:</b> ${date}</p>
                            <p><b>Giờ:</b> ${exam.examTime}</p>
                            <p><b>Phòng:</b> ${exam.room || 'Chưa xếp'}</p>
                        `;
                })
                .catch(() => {
                    document.getElementById("content").innerHTML =
                        "<p style='color:red;'>Không tìm thấy kỳ thi</p>";
                });
        }
    </script>

</body>
</html>

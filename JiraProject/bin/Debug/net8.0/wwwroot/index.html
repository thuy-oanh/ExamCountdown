<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Exam Countdown</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 420px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-add {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-add:hover {
            background-color: #2980b9;
        }

        .exam-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .exam-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fff;
            transition: transform 0.2s;
        }

        .exam-item:hover {
            border-color: #3498db;
        }

        .exam-item b {
            color: #3498db;
            font-size: 1.1em;
            display: block;
            margin-bottom: 5px;
        }

        .exam-item small {
            color: #7f8c8d;
            line-height: 1.5;
        }

        .empty {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }

        .exam-list::-webkit-scrollbar {
            width: 6px;
        }

        .exam-list::-webkit-scrollbar-thumb {
            background: #3498db;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>
            📅 Exam Countdown
            <a href="/taokỵthi.html" class="btn-add">+ Thêm</a>
        </h2>
        <div id="displayArea" class="exam-list">
            <p style="text-align:center">Đang tải lịch thi...</p>
        </div>
    </div>

    <script>
        async function loadData() {
            const area = document.getElementById('displayArea');
            try {
                const res = await fetch('/api/exam');
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();

                if (!data || data.length === 0) {
                    area.innerHTML = '<div class="empty">Chưa có kỳ thi nào được tạo</div>';
                    return;
                }

                // Đã fix: Đổi thành camelCase (tenKyThi, ngayThi, phongThi)
                area.innerHTML = data.map(item => {
                    const dateObj = new Date(item.ngayThi);
                    const day = String(dateObj.getDate()).padStart(2, '0');
                    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const year = dateObj.getFullYear();
                    const formattedDate = `${day}/${month}/${year}`;
                    
                    const displayTime = String(dateObj.getHours()).padStart(2, '0') + ':' + String(dateObj.getMinutes()).padStart(2, '0');
                    const roomText = item.phongThi ? item.phongThi : 'Chưa cập nhật';

                    return `
                        <div class="exam-item">
                            <b>Môn: ${item.tenKyThi}</b>
                            <small>
                                📅 Ngày: ${formattedDate} <br>
                                ⏰ Giờ: ${displayTime} <br>
                                📍 Phòng: ${roomText}
                            </small>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                area.innerHTML = '<div class="empty">Lỗi: Không thể kết nối đến máy chủ!</div>';
            }
        }

        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý Kỳ thi</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #f4f6f9;
}

.main {
  padding: 30px;
}

/* FORM */
input, button {
  padding: 8px;
  margin: 5px;
}

/* TABLE */
table {
  width: 100%;
  background: white;
  border-radius: 10px;
  margin-top: 10px;
}

th, td {
  padding: 12px;
}

th {
  background: #2a5298;
  color: white;
}

tr:hover {
  background: #f1f5ff;
}

/* BUTTON */
.btn-xoa {
  background: red;
  color: white;
  border: none;
}

.icon-rac {
  font-size: 24px;
  cursor: pointer;
  float: right;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="main">

<h2>Quản lý Kỳ thi 
  <span class="icon-rac" onclick="moThungRac()">🗑️</span>
</h2>

<!-- FORM -->
<input id="tenKyThi" placeholder="Tên kỳ thi">
<input type="date" id="ngayThi">
<button onclick="themKyThi()">Thêm</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>STT</th>
<th>Tên</th>
<th>Ngày</th>
<th>Xóa</th>
</tr>
</thead>
<tbody id="bangKyThi"></tbody>
</table>

</div>

<!-- MODAL XÓA -->
<div class="modal" id="modalXoa">
  <div class="modal-content">
    <p>Xóa kỳ thi?</p>
    <button onclick="dongModal()">Hủy</button>
    <button onclick="xacNhanXoa()">Xóa</button>
  </div>
</div>

<!-- MODAL THÙNG RÁC -->
<div class="modal" id="modalRac">
  <div class="modal-content">
    <h3>Thùng rác</h3>
    <div id="dsRac"></div>
    <button onclick="dongThungRac()">Đóng</button>
  </div>
</div>

<script>

// DATA
let danhSach = [];
let thungRac = [];
let viTri = null;

// HIỂN THỊ
function hienThi(){
  const bang = document.getElementById('bangKyThi');
  bang.innerHTML = '';

  danhSach.forEach((k, i)=>{
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${k.ten}</td>
      <td>${k.ngay}</td>
      <td><button class="btn-xoa">Xóa</button></td>
    `;

    tr.querySelector('.btn-xoa').onclick = () => moModal(i);

    bang.appendChild(tr);
  });
}

// THÊM
function themKyThi(){
  const ten = document.getElementById('tenKyThi').value;
  const ngay = document.getElementById('ngayThi').value;

  if(!ten || !ngay){
    alert("Nhập đủ!");
    return;
  }

  danhSach.push({ten, ngay});

  hienThi();
}

// MODAL XÓA
function moModal(i){
  viTri = i;
  document.getElementById('modalXoa').style.display = 'flex';
}

function dongModal(){
  document.getElementById('modalXoa').style.display = 'none';
}

// XÓA
function xacNhanXoa(){
  const item = danhSach[viTri];

  danhSach.splice(viTri,1);
  thungRac.push(item);

  dongModal();
  hienThi();
}

// THÙNG RÁC
function moThungRac(){
  const box = document.getElementById('dsRac');
  box.innerHTML = '';

  thungRac.forEach((k,i)=>{
    const div = document.createElement('div');

    div.innerHTML = `
      ${k.ten} - ${k.ngay}
      <button onclick="khoiPhuc(${i})">Khôi phục</button>
    `;

    box.appendChild(div);
  });

  document.getElementById('modalRac').style.display = 'flex';
}

function dongThungRac(){
  document.getElementById('modalRac').style.display = 'none';
}

// KHÔI PHỤC
function khoiPhuc(i){
  danhSach.push(thungRac[i]);
  thungRac.splice(i,1);

  moThungRac();
  hienThi();
}

</script>

</body>
</html>
